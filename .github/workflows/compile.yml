name: Compile Lists

on:
  # Run twice a day at 3:00 AM and 3:00 PM UTC
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Also run when sources.txt or the script itself changes
  push:
    paths:
      - "sources.txt"
      - "compile.py"

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run compiler
        run: python compile.py

      - name: Commit and push blocklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt whitelist.txt
          # Only commit if there are actual changes
          git diff --cached --quiet || git -f commit -m "Update lists $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
  